media:
  input: static/images
  output: /images

content:
  - name: blog
    label: Blog Posts
    type: collection
    path: content/blog
    filename: "{year}-{month}-{day}-{primary}.md"
    view:
      fields: [title, date, draft]
      primary: title
      sort: [date, desc]
    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: date
        label: Publish Date
        type: date
        options:
          format: yyyy-MM-dd'T'HH:mm:ssXXX

      - name: draft
        label: Draft
        type: boolean
        default: true

      - name: description
        label: Description
        type: text

      - name: tags
        label: Tags
        type: string
        list: true

      - name: categories
        label: Categories
        type: string
        list: true

      - name: featured_image
        label: Featured Image
        type: image

      - name: body
        label: Content
        type: rich-text

  - name: pages
    label: Pages
    type: collection
    path: content
    include:
      - about.md
      - contact.md
    fields:
      - name: title
        label: Title
        type: string

      - name: body
        label: Content
        type: rich-text

settings:
  hide_git_commit: false